name: Auto Trade Runner

on:
  schedule:
    # Run every 10 minutes between 11:00 and 15:00 Sun-Thu
    # Note: GitHub Actions cron is in UTC.
    # Nepal Time (NPT) is UTC+05:45.
    # 11:00 NPT = 05:15 UTC
    # 15:00 NPT = 09:15 UTC
    - cron: '15,25,35,45,55 5-9 * * 0-4'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Trading Bot
        env:
          NAASA_USERNAME: ${{ secrets.NAASA_USERNAME }}
          NAASA_PASSWORD: ${{ secrets.NAASA_PASSWORD }}
          CHUKUL_USERNAME: ${{ secrets.CHUKUL_USERNAME }}
          CHUKUL_PASSWORD: ${{ secrets.CHUKUL_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          RUN_ONCE: "True"
          DRY_RUN: ${{ secrets.DRY_RUN }}
          POLL_INTERVAL: ${{ secrets.POLL_INTERVAL }}
          SLEEP_INTERVAL_CLOSED: ${{ secrets.SLEEP_INTERVAL_CLOSED }}
          MAX_DAILY_BUYS: ${{ secrets.MAX_DAILY_BUYS }}
          BUY_THRESHOLD: ${{ secrets.BUY_THRESHOLD }}
          SELL_THRESHOLD: ${{ secrets.SELL_THRESHOLD }}
          DEFAULT_BUY_QTY: ${{ secrets.DEFAULT_BUY_QTY }}
          BROKER_CONCENTRATION_THRESHOLD: ${{ secrets.BROKER_CONCENTRATION_THRESHOLD }}
          FETCH_MAX_WORKERS: ${{ secrets.FETCH_MAX_WORKERS }}
        run: |
          python main.py

      - name: Commit State Changes (Optional)
        # If an order is made, it will be saved to placed_orders_today.json.
        # This writes it back to the repo so the next interval remembers it.
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add placed_orders_today.json
          git status
          # Only commit and push if the state file changed
          git diff-index --quiet HEAD || (git commit -m "Update daily placed orders state" && git push)
