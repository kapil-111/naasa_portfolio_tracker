name: Auto Trade Runner

on:
  schedule:
    # Pre-market data refresh: 10:15 AM NPT (04:30 UTC), Sun–Thu
    - cron: '30 4 * * 0-4'
    # Every hour during market hours: 11:00 AM–3:15 PM NPT (05:15–09:15 UTC), Sun–Thu
    - cron: '15 5,6,7,8,9 * * 0-4'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Cache pip packages ──────────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      # ── Cache Playwright browser ────────────────────────────────────────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-chromium-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # ── Run bot ────────────────────────────────────────────────────────────
      - name: Run Trading Bot
        env:
          NAASA_USERNAME: ${{ secrets.NAASA_USERNAME }}
          NAASA_PASSWORD: ${{ secrets.NAASA_PASSWORD }}
          CHUKUL_USERNAME: ${{ secrets.CHUKUL_USERNAME }}
          CHUKUL_PASSWORD: ${{ secrets.CHUKUL_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          MAX_DAILY_BUYS: ${{ secrets.MAX_DAILY_BUYS }}
          BUY_THRESHOLD: ${{ secrets.BUY_THRESHOLD }}
          SELL_THRESHOLD: ${{ secrets.SELL_THRESHOLD }}
          DEFAULT_BUY_QTY: ${{ secrets.DEFAULT_BUY_QTY }}
          BROKER_CONCENTRATION_THRESHOLD: ${{ secrets.BROKER_CONCENTRATION_THRESHOLD }}
          FETCH_MAX_WORKERS: ${{ secrets.FETCH_MAX_WORKERS }}
          RUN_ONCE: "True"
          POLL_INTERVAL: "60"
          SLEEP_INTERVAL_CLOSED: "60"
        run: python main.py

      # ── Persist daily order state ──────────────────────────────────────────
      # ── Persist daily order state ──────────────────────────────────────────
      - name: Save order state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add placed_orders_today.json 2>/dev/null || true
          git add chukul_data.csv chukul_indicators.csv chukul_fundamental.csv \
                  chukul_bonus.csv chukul_broker_buy.csv chukul_broker_sell.csv \
                  chukul_brokers.csv portfolio_data.csv live_market_data.csv 2>/dev/null || true
          git diff-index --cached --quiet HEAD || (git commit -m "Update market data and order state" && git push)
